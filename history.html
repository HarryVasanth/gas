<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <title>Gas Price History</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div style="width: 90%; margin: 0 auto">
      <canvas id="gasChart"></canvas>
    </div>

    <script>
      async function loadData() {
        const response = await fetch(
          "https://raw.githubusercontent.com/carlosrsabreu/devo-abastecer/main/history/gas_info_history.json",
        );
        const data = await response.json();

        // Process data
        const dates = Object.keys(data).sort();
        const datasets = [];

        // Create dataset structure
        const fuelTypes = [
          "Gasolina IO95",
          "Gasolina IO98",
          "Gasóleo Rodoviário",
          "Gasóleo Colorido e Marcado",
        ];
        const colors = {
          "Gasolina IO95": "rgb(255, 99, 132)",
          "Gasolina IO98": "rgb(75, 192, 192)",
          "Gasóleo Rodoviário": "rgb(54, 162, 235)",
          "Gasóleo Colorido e Marcado": "rgb(255, 205, 86)",
        };

        fuelTypes.forEach((fuel) => {
          datasets.push({
            label: fuel,
            data: dates.map(
              (date) => data[date].Gas?.[fuel] || data[date].Fuel?.[fuel],
            ),
            borderColor: colors[fuel],
            tension: 0.1,
          });
        });

        // Create chart
        new Chart(document.getElementById("gasChart"), {
          type: "line",
          data: {
            labels: dates.map((d) => new Date(d).toLocaleDateString()),
            datasets: datasets,
          },
          options: {
            responsive: true,
            interaction: {
              mode: "index",
              intersect: false,
            },
            scales: {
              x: {
                title: {
                  display: true,
                  text: "Date",
                },
              },
              y: {
                title: {
                  display: true,
                  text: "Price (€/L)",
                },
              },
            },
            plugins: {
              tooltip: {
                callbacks: {
                  label: (context) =>
                    `${context.dataset.label}: €${context.parsed.y.toFixed(3)}`,
                },
              },
            },
          },
        });
      }

      loadData();
    </script>
  </body>
</html>
